# ══════════════════════════════════════════════════════════════════════════════
# Loom — Shared Infrastructure
# Runs the services that all Threads share: MySQL, Typesense, phpMyAdmin,
# FileBrowser. No Tribe application containers live here.
#
# Usage:
#   cp .env.loom.sample .env.loom
#   docker compose -f docker-compose.loom.yml --env-file .env.loom up -d
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ─── MySQL — shared across all Threads ──────────────────────────────────────
  mysql:
    image: mysql:9
    container_name: loom_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - loom_network

  # ─── Typesense — shared across all Threads ──────────────────────────────────
  # Each Thread scopes its collections via TYPESENSE_COLLECTION_PREFIX.
  typesense:
    image: typesense/typesense:29.0
    container_name: loom_typesense
    restart: unless-stopped
    volumes:
      - ./uploads/typesense:/data
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz}
      - TYPESENSE_ENABLE_CORS=true
    command: >
      sh -c "
        mkdir -p /data &&
        /opt/typesense-server --data-dir /data --api-key \$TYPESENSE_API_KEY --enable-cors
      "
    networks:
      - loom_network

  # ─── phpMyAdmin — manages all Thread databases ───────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    platform: linux/amd64
    container_name: loom_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-12001}:80"
    environment:
      PMA_HOST: loom_mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 2G
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - loom_network

  # ─── FileBrowser — browses all Thread upload folders ────────────────────────
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: loom_filebrowser
    restart: unless-stopped
    ports:
      - "${FILEBROWSER_PORT:-12005}:80"
    volumes:
      - ./uploads/threads:/srv
      - ./uploads/filebrowser:/database
    environment:
      - FB_DATABASE=/database/filebrowser.db
      - FB_ROOT=/srv
      - FB_PORT=80
      - FB_ADDRESS=0.0.0.0
    depends_on:
      loom_setup:
        condition: service_healthy
    networks:
      - loom_network

  # ─── MySQL Backup — backs up all Thread databases ────────────────────────────
  mysql_backup:
    image: mysql:9
    container_name: loom_mysql_backup
    restart: unless-stopped
    volumes:
      - ./uploads/backups:/backups
      - ./config/backup.sh:/backup.sh:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - MYSQL_PWD=${DB_ROOT_PASSWORD}
      # Backs up ALL databases (overrides per-thread DB_NAME in backup.sh).
      # The backup script uses DB_NAME; set to --all-databases for loom-wide backups.
      - DB_NAME=--all-databases
      - DB_HOST=loom_mysql
      - PROJECT_NAME=loom
    command: ["bash", "/backup.sh"]
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - loom_network

  # ─── Loom Setup — one-shot initialisation ────────────────────────────────────
  # Downloads tribe-base if absent, runs composer install, initialises FileBrowser.
  loom_setup:
    image: tribeframework/tribe-core:v1.2
    platform: linux/amd64
    container_name: loom_setup
    volumes:
      - ./config:/config
      - ./applications:/applications
      - ./uploads:/uploads
      - .:/workdir
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workdir
    command: sh -c "bash ./config/loom/setup.sh && touch /tmp/loom_setup_complete && tail -f /dev/null"
    env_file:
      - .env.loom
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/loom_setup_complete"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 120s
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - loom_network

# ─── Network ─────────────────────────────────────────────────────────────────
# External so Threads can join it without being in this compose file.
networks:
  loom_network:
    driver: bridge
    name: loom_network

volumes:
  mysql_data:
    name: loom_mysql_data
    driver: local
