services:
  # ─── Setup — provisions this thread's DB on loom's MySQL ─────────────────────
  # No local MySQL. The thread connects to loom's shared MySQL container over
  # the shared Docker network (tribe_network defined in tribe-loom).
  setup:
    image: alpine:3
    container_name: ${PROJECT_NAME}_setup
    volumes:
      - ./config:/config
      - ./applications:/applications
      - ./uploads:/uploads
      - .:/workdir
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workdir
    command: sh -c "apk add --no-cache curl unzip bash docker-cli && bash ./config/setup.sh && touch /tmp/setup_complete && tail -f /dev/null"
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/setup_complete"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - loom_network

  # ─── PHP-FPM for Tribe (this thread's main app) ───────────────────────────────
  php_tribe:
    image: tribeframework/tribe-core:v1.2
    platform: linux/amd64
    container_name: ${PROJECT_NAME}_php_tribe
    restart: unless-stopped
    environment:
      - PROJECT_NAME=${PROJECT_NAME}
      - TYPESENSE_HOST=${PROJECT_NAME}_typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz}
      - COLLECTION_NAME=files
      - INDEX_FOLDER=/var/www/html/uploads
      - INDEX_DB_SCRIPT=/var/www/html/index_db.php
    volumes:
      - ./applications/tribe:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./.env:/var/www/html/.env
      - ./logs:/var/log
      - ./applications/tribe/index.php:/var/www/html/index.php
      - ./config/tribe/index_files.php:/var/www/html/index_files.php
      - ./config/tribe/watcher.sh:/var/www/html/watcher.sh
      - ./config/tribe/index_db.php:/var/www/html/index_db.php
      - ./config/tribe/supervisord.conf:/etc/supervisor/conf.d/tribe.conf:ro
    command: >
      sh -c "
        composer install --no-interaction --optimize-autoloader &&
        chmod +x /var/www/html/watcher.sh &&
        exec supervisord -c /etc/supervisor/conf.d/tribe.conf
      "
    depends_on:
      setup:
        condition: service_healthy
      typesense:
        condition: service_started
    networks:
      - loom_network

  # ─── PHP-FPM for Junction ─────────────────────────────────────────────────────
  php_junction:
    image: tribeframework/tribe-core:v1.2
    platform: linux/amd64
    container_name: ${PROJECT_NAME}_php_junction
    restart: unless-stopped
    volumes:
      - ./applications/junction/dist:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./.env:/var/www/html/.env
      - ./logs:/var/log
    command: >
      sh -c "composer install --no-interaction --optimize-autoloader &&
             php-fpm"
    depends_on:
      setup:
        condition: service_healthy
    networks:
      - loom_network

  # ─── PHP-FPM for dist-php ─────────────────────────────────────────────────────
  php_dist:
    image: tribeframework/tribe-core:v1.2
    platform: linux/amd64
    container_name: ${PROJECT_NAME}_php_dist
    restart: unless-stopped
    volumes:
      - ./uploads/sites/dist-php:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./.env:/var/www/html/.env
      - ./logs:/var/log
    command: >
      sh -c "if [ -f composer.json ]; then composer install --no-interaction --optimize-autoloader; fi &&
             php-fpm"
    depends_on:
      setup:
        condition: service_healthy
    networks:
      - loom_network

  # ─── Caddy — Tribe (main app) ─────────────────────────────────────────────────
  caddy_tribe:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME}_caddy_tribe
    restart: unless-stopped
    environment:
      - PROJECT_NAME=${PROJECT_NAME}
    ports:
      - "${TRIBE_PORT}:80"
    volumes:
      - ./applications/tribe:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./.env:/var/www/html/.env
      - ./applications/tribe/index.php:/var/www/html/index.php
      - ./config/tribe/Caddyfile:/etc/caddy/Caddyfile
      - ./logs:/var/log/caddy
      - tribe_caddy_data:/data
      - tribe_caddy_config:/config
    depends_on:
      setup:
        condition: service_healthy
      php_tribe:
        condition: service_started
    networks:
      - loom_network

  # ─── Caddy — Junction ─────────────────────────────────────────────────────────
  caddy_junction:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME}_caddy_junction
    restart: unless-stopped
    environment:
      - PROJECT_NAME=${PROJECT_NAME}
    ports:
      - "${JUNCTION_PORT}:80"
    volumes:
      - ./applications/junction/dist:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./.env:/var/www/html/.env
      - ./config/junction/Caddyfile:/etc/caddy/Caddyfile
      - ./logs:/var/log/caddy
      - junction_caddy_data:/data
      - junction_caddy_config:/config
    depends_on:
      setup:
        condition: service_healthy
      php_junction:
        condition: service_started
    networks:
      - loom_network

  # ─── Caddy — dist (static) ────────────────────────────────────────────────────
  caddy_dist:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME}_caddy_dist
    restart: unless-stopped
    ports:
      - "${DIST_PORT}:80"
    volumes:
      - ./uploads/sites/dist:/srv
      - ./config/dist/Caddyfile:/etc/caddy/Caddyfile
      - ./logs:/var/log/caddy
    depends_on:
      setup:
        condition: service_healthy
    networks:
      - loom_network

  # ─── Caddy — dist-php ────────────────────────────────────────────────────────
  caddy_php_dist:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME}_caddy_php_dist
    restart: unless-stopped
    environment:
      - PROJECT_NAME=${PROJECT_NAME}
    ports:
      - "${DIST_PHP_PORT}:80"
    volumes:
      - ./uploads/sites/dist-php:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./.env:/var/www/html/.env
      - ./config/dist-php/Caddyfile:/etc/caddy/Caddyfile
      - ./logs:/var/log/caddy
      - dist_php_caddy_data:/data
      - dist_php_caddy_config:/config
    depends_on:
      setup:
        condition: service_healthy
      php_dist:
        condition: service_started
    networks:
      - loom_network

  # ─── Typesense — per-thread private instance ──────────────────────────────────
  typesense:
    image: typesense/typesense:29.0
    container_name: ${PROJECT_NAME}_typesense
    restart: unless-stopped
    ports:
      - "${TYPESENSE_PORT}:8108"
    volumes:
      - ./uploads/typesense:/data
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz}
      - TYPESENSE_ENABLE_CORS=true
    command: >
      sh -c "
        mkdir -p /data &&
        /opt/typesense-server --data-dir /data --api-key \$TYPESENSE_API_KEY --enable-cors
      "
    depends_on:
      setup:
        condition: service_healthy
    networks:
      - loom_network

# ─── Network — external, defined by tribe-loom ────────────────────────────────
# The network name must match: <LOOM_PROJECT_NAME>_tribe_network
# Set LOOM_PROJECT_NAME in .env to the PROJECT_NAME value used in tribe-loom.
networks:
  loom_network:
    external: true
    name: ${LOOM_PROJECT_NAME}_network

volumes:
  tribe_caddy_data:
    name: ${PROJECT_NAME}_tribe_caddy_data
  tribe_caddy_config:
    name: ${PROJECT_NAME}_tribe_caddy_config
  junction_caddy_data:
    name: ${PROJECT_NAME}_junction_caddy_data
  junction_caddy_config:
    name: ${PROJECT_NAME}_junction_caddy_config
  dist_php_caddy_data:
    name: ${PROJECT_NAME}_dist_php_caddy_data
  dist_php_caddy_config:
    name: ${PROJECT_NAME}_dist_php_caddy_config
